<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Registration</title>

    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.3/css/dx.dark.css">

    <link rel="stylesheet" href="Style.css" />

</head>
<body>
    <!-- Page header -->
    <div class="page-header">
        <h1>Employee Registration</h1>
    </div>

    <!-- Step Tracker -->
    <div class="step-tracker">
        <div class="step-item active" id="st1"> 
            <div class="step-circle">
                <span class="num">1</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>
            <span class="step-label">Personal</span>
        </div>

        <div class="step-connector" id="con1"></div>

        <div class="step-item" id="st2">
            <div class="step-circle">
                <span class="num">2</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>
            <span class="step-label">Employment</span>
        </div>

        <div class="step-connector" id="con2"></div>

        <div class="step-item" id="st3">
            <div class="step-circle">
                <span class="num">3</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>
            <span class="step-label">Skills &amp; Docs</span>
        </div>
    </div>

    <!-- Card -->
    <div class="form-card">


        <!--STEP 1-->
        <div class="step-panel active" id="panel1">
            <div class="section-strip">
                <div class="sdot" style="background:#4f8ef7"></div>
                <h2>Personal Information</h2>
                <span class="step-count">Step 1 of 3</span>
            </div>
            <div class="form-body">
                <div class="form-grid">
                    <div class="field-wrap">
                        <label class="field-label">First Name <span class="req">*</span></label>
                        <div id="firstName"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Last Name <span class="req">*</span></label>
                        <div id="lastName"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Date of Birth <span class="req">*</span></label>
                        <div id="dob"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Gender <span class="req">*</span></label>
                        <div id="gender"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Email Address <span class="req">*</span></label>
                        <div id="email"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Phone Number <span class="req">*</span></label>
                        <div id="phone"></div>
                    </div>
                    <div class="field-wrap col-full">
                        <label class="field-label">Home Address</label>
                        <div id="address"></div>
                    </div>
                </div>
            </div>
            <hr class="divider" />
            <div class="btn-row one">
                <div id="btn1Next"></div>
            </div>
        </div>

        <!-- ══════════════════════════
             STEP 2 — Employment
             Validation group: "step2"
        ══════════════════════════ -->
        <div class="step-panel" id="panel2">
            <div class="section-strip">
                <div class="sdot" style="background:#a78bfa"></div>
                <h2>Employment Details</h2>
                <span class="step-count">Step 2 of 3</span>
            </div>
            <div class="form-body">
                <div class="form-grid">
                    <div class="field-wrap">
                        <label class="field-label">Employee ID <span class="req">*</span></label>
                        <div id="empId"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Job Title <span class="req">*</span></label>
                        <div id="jobTitle"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Department <span class="req">*</span></label>
                        <div id="department"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Employment Type <span class="req">*</span></label>
                        <div id="empType"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Joining Date <span class="req">*</span></label>
                        <div id="joiningDate"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Work Location</label>
                        <div id="workLocation"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Salary (₹ / month)</label>
                        <div id="salary"></div>
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Reporting Manager</label>
                        <div id="manager"></div>
                    </div>
                </div>
            </div>
            <hr class="divider" />
            <div class="btn-row two">
                <div id="btn2Back"></div>
                <div id="btn2Next"></div>
            </div>
        </div>

        <!-- ══════════════════════════
             STEP 3 — Skills & Docs
             Validation group: "step3"
        ══════════════════════════ -->
        <div class="step-panel" id="panel3">
            <div class="section-strip">
                <div class="sdot" style="background:#34d399"></div>
                <h2>Skills &amp; Documents</h2>
                <span class="step-count">Step 3 of 3</span>
            </div>
            <div class="form-body">
                <div class="form-grid">
                    <div class="field-wrap col-full">
                        <label class="field-label">Upload Resume / Documents</label>
                        <div id="uploadBtn"></div>
                        <div id="fileUpload"></div>
                    </div>
                    <div class="field-wrap col-full">
                        <label class="field-label">Additional Notes</label>
                        <div id="notes"></div>
                    </div>
                    <div class="field-wrap col-full" style="flex-direction:row;align-items:center;gap:12px;padding-top:4px;">
                        <div id="agree"></div>
                        <span style="font-size:13px;color:var(--muted);">
                            I confirm all provided information is accurate and complete.
                            <span style="color:var(--error)">*</span>
                        </span>
                    </div>
                </div>
            </div>
            <hr class="divider" />
            <div class="btn-row three">
                <div id="btn3Back"></div>
                <div id="btn3Reset"></div>
                <div id="btn3Submit"></div>
            </div>
        </div>

    </div><!-- /form-card -->

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- DevExtreme AFTER jQuery -->
    <script src="https://cdn3.devexpress.com/jslib/24.2.3/js/dx.all.js"></script>
    <script src="app.js"></script>
</body>
</html>
