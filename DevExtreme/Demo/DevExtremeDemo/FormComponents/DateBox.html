<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <!-- jQuery -->
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- DevExtreme theme -->
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.13/css/dx.dark.css">

    <!-- DevExtreme libraries (reference only one of them) -->
    <script type="text/javascript" src="https://cdn3.devexpress.com/jslib/24.2.13/js/dx.all.js"></script>
</head>
<body>
    <div id="dateBox">

    </div>

    <script>
        $("#dateBox").dxDateBox();
        var instance = $("#dateBox").dxDateBox("instance");

        instance.option("type", "datetime");

        // false => not allow to write custom value just choose a date
        // true => allow to write
        //instance.option("acceptCustomValue", false);
        instance.option("invalidDateMessage", "you don't know how to write date");

        // access by alt + a
        instance.option("accessKey", "a");

        // not see any diff
        instance.option("adaptivityEnabled", true);
        //instance.option("deferRendering", false);

        // apply onlu after btn click
        instance.option("applyValueMode", "useButtons");

        // change the text of apply btn
        instance.option("applyButtonText", "ronak");

        // working
        instance.option("activeStateEnabled", false);

        // cahnge the text of cancel btn
        instance.option("cancelButtonText", "wrong");

        //instance.option("dateSerializationFormat", "yyyy-MM-dd");
        instance.option("dateSerializationFormat", "yyyy-MM-ddTHH:mm:ss");

        //instance.option("disabled", true);

        instance.option("disabledDates", [
            new Date("02/11/2026"),
            new Date("02/12/2026"),
            new Date("02/13/2026")
        ]);

        // we can not focus through tab key, and alt + accessKey
        //instance.option("focusStateEnabled", false);

        instance.option("height", "100px")

        instance.option("hint", "set your date");

        instance.option("hoverStateEnabled", true);

        //instance.option("isValid", false);    

        instance.option("label", "hello enter date")

        instance.option("labelMode", "floating");
        //instance.option("labelMode", "static");
        //instance.option("labelMode", "outside");

        instance.option("max", "02/25/2026");

        instance.option("min", "02/2/2026");

        instance.option("dateOutOfRangeMessage", "not in give range");


        //instance.option("type", "time");
        //instance.option("interval", 59);


        // ========================== Events ==========================

        // calls only when text change manualy no select from dropdown
        instance.option("onChange", function (event) {
            // event => dx component, html element, event
            console.log(event)
            console.log("Changed !!!")
        })

        instance.option("onClosed", function (event) {
            // event =>  dx component, html element
            console.log(event)
            console.log("closed !!!")
        })

        instance.option("onContentReady", function (event){
            console.log(event)
            console.log("content ready !!")
        })

        instance.option("onEnterKey", function (event) {
            // event => dx component, html element, event
            console.log(event);
            console.log("Enter pressed");
        })

        instance.option("onFocusIn", function (event) {
            // event => dx component, html element, event
            console.log(event);
            console.log("focus in");
        })

        instance.option("onFocusOut", function (event) {
            // event => dx component, html element, event
            console.log(event);
            console.log("focus out");
        })

        instance.option("onInput", function (event) {
            // event => dx component, html element, event
            console.log(event);
            console.log("input cahnged");
        })

        // call until key is press down
        // call multiple time when key is press down for many seconds
        instance.option("onKeyDown", function (event) {
            // event => dx component, html element, event
            console.log(event);
            console.log("key down");
        })

        // call once when key up
        instance.option("onKeyUp", function (event) {
            // event => dx component, html element, event
            console.log(event);
            console.log("key up");
        });

        // call when drop down open
        // focus in  -> open : sequence of call
        instance.option("onOpened", function (event) {
            // event => dx component, html element, event
            console.log(event);
            console.log("opened");
        })

        instance.option("pickerType", "calendar")
        //instance.option("pickerType", "list")
        //instance.option("pickerType", "native")
        //instance.option("pickerType", "rollers")

        //instance.option("showAnalogClock", false);


        //instance.option("showDropDownButton", false);

        instance.option("stylingMode", "outlined");
        //instance.option("stylingMode", "filled");



        //================================== Mehtods ===============================

        // beginUpdate()
        // blur()
        // clear()
        // close()
        // content()

        instance.focus();

        instance.blur();

        instance.open();

        setTimeout(function () {
            instance.close();
        },2000);


    </script>
</body>
</html>
