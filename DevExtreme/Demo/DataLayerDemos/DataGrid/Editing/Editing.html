<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>DevExtreme DataGrid - Editing</title>

    <!-- DevExtreme CSS -->
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.3/css/dx.light.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DevExtreme JS -->

    <link rel="stylesheet" href="Editing.css" />
</head>
<body>

    <h1>Editing</h1>
    <hr />

    <h1>Button for change value in grid by methods</h1>
    <hr />
    <div id="btn"></div>
    <div id="btn2"></div>

    <h1>Filter Builder </h1>
    <hr />
    <div id="filterBuilder"></div>
    <div id="applyFilter"></div>

    <hr />
    <div id="textbox"></div>
    <div id="select"></div>
    <div id="deselect"></div>

    <h1>Band columns</h1>
    <div id="grid1"></div>

    <h1>Lookup columns</h1>
    <div id="grid2"></div>


    <!--grid-->
    <script src="Editing.js"></script>

    <!--grid2-->

    <!--grid3-->
