<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <!-- DevExtreme CSS -->
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.3/css/dx.light.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DevExtreme JS -->
    <script src="https://cdn3.devexpress.com/jslib/24.2.3/js/dx.all.js"></script>
</head>
<body>
    <div id="grid"></div>
    <script>

        let dataArray = [
            { id: 1, name: "asdf", email: "qwer" },
            { id: 2, name: "sdfg", email: "wert" },
            { id: 3, name: "dfgh", email: "erty" },
            { id: 4, name: "asdf", email: "qwer" },
            { id: 5, name: "sdfg", email: "wert" },
            { id: 6, name: "dfgh", email: "erty" },
            { id: 7, name: "asdf", email: "qwer" },
            { id: 8, name: "sdfg", email: "wert" },
            { id: 9, name: "dfgh", email: "erty" },
            { id: 10, name: "asdf", email: "qwer" },
            { id: 11, name: "sdfg", email: "wert" },
            { id: 12, name: "dfgh", email: "erty" }
        ]

        // direct bind

        $("#grid").dxDataGrid({
            dataSource : dataArray,
            key : "id"
        })


        // create a datasource and bind it

        let store = new DevExpress.data.ArrayStore({
            data: dataArray,
            key: "id"
        })


        let source = new DevExpress.data.DataSource({
            store: store
        })

        $("#grid").dxDataGrid({
            dataSource: source,
        })
    </script>
</body>
</html>
