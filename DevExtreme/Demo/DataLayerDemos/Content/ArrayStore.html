<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>ArrayStore Full Demo</title>

    <!-- DevExtreme CSS -->
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/24.2.3/css/dx.light.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DevExtreme JS -->
    <script src="https://cdn3.devexpress.com/jslib/24.2.3/js/dx.all.js"></script>
</head>
<body>

    <h2>ArrayStore Demo</h2>

    <button id="loadBtn">Load Data</button>
    <button id="insertBtn">Insert</button>
    <button id="updateBtn">Update</button>
    <button id="removeBtn">Remove</button>

    <pre id="output"></pre>

    <script>
        $(function () {

            var employees = [
                { id: 1, name: "ABC", age: 25 },
                { id: 2, name: "DEF", age: 30 },
                { id: 3, name: "XYZ", age: 28 }
            ];

           
            var store = new DevExpress.data.ArrayStore({

                key: "id", // Unique key field (mandatory for update/remove)

                data: employees, // Initial data source (array)

                // before inserting data
                onInserting: function (values) {
                    console.log("Before Insert:", values);
                },

                // after inserting data
                onInserted: function (values) {
                    console.log("After Insert:", values);
                },

                // before update
                onUpdating: function (key, values) {
                    console.log("Before Update:", key, values);
                },

                // after update
                onUpdated: function (key, values) {
                    console.log("After Update:", key, values);
                },

                // before remove
                onRemoving: function (key) {
                    console.log("Before Remove:", key);
                },

                // after remove
                onRemoved: function (key) {
                    console.log("After Remove:", key);
                },

                // Error handler
                errorHandler: function (error) {
                    console.error("Error:", error.message);
                }
            });

            function displayData(data) {
                $("#output").text(JSON.stringify(data, null, 2));
            }

            // LOAD DATA
            $("#loadBtn").click(function () {

                // load() returns a promise
                store.load().done(function (data) {

                    // Display loaded data
                    displayData(data);
                });
            });

            // INSERT DATA
            $("#insertBtn").click(function () {

                store.insert({
                    id: 4,
                    name: "New User",
                    age: 22
                }).done(function () {

                    console.log("Inserted Successfully");

                    // Reload data after insert
                    store.load().done(displayData);
                });
            });

            // UPDATE DATA
            $("#updateBtn").click(function () {

                store.update(2, {   // 2 = key
                    name: "Here Updated",
                    age: 35
                }).done(function () {

                    console.log("Updated Successfully");

                    store.load().done(displayData);
                });
            });

            // REMOVE DATA
            $("#removeBtn").click(function () {

                store.remove(1) // remove by key
                    .done(function () {

                        console.log("Removed Successfully");

                        store.load().done(displayData);
                    });
            });

        });
    </script>

</body>
</html>
